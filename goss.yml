---
package:
  curl:
    installed: true
  sudo:
    installed: true
  gdal-bin:
    installed: false
  ghostscript:
    installed: false

command:
  node --version:
    exit-status: 0
    stdout:
      - "v24"
  yarn --version:
    exit-status: 0
    stdout:
      - "1.22"
  npm --version:
    exit-status: 0
    stdout:
      - "11"
  php -r "echo join(',', Imagick::queryFormats('PDF'));":
    exit-status: 0
    stdout:
      - "PDF"
  composer --version:
    exit-status: 0
    stdout:
      - "2"
  php -m:
    exit-status: 0
    stdout:
      - bcmath
      - bz2
      - calendar
      - exif
      - gd
      - iconv
      - imagick
      - intl
      - FFI
      - mbstring
      - OPcache
      - pcntl
      - pdo_mysql
      - pdo_pgsql
      - sqlsrv
      - pdo_sqlsrv
      - redis
      - xml
      - soap
      - zip
      - xsl
file:
  /usr/local/etc/php/conf.d/zz-conf.ini:
    exists: true
    contents:
      - memory_limit
  /usr/local/etc/php/conf.d/opcache-recommended.ini:
    exists: true
  /usr/local/etc/php/conf.d/apcu-recommended.ini:
    exists: true
  /usr/local/etc/php/conf.d/php_timezone.ini:
    exists: true
    contents: 
      - "date.timezone=UTC"
      - "!mv"
  /home/php:
    exists: true
    owner: php
  /home/php/.composer:
    exists: true
    owner: php
  /etc/ImageMagick-6/policy.xml:
    exists: true
    contents:
      - "<policy domain=\"module\" rights=\"read|write\" pattern=\"PDF\" />"

user:
  php:
    exists: true
    home: /home/php